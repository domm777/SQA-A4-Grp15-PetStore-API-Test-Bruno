info:
  name: Pet By ID (200)
  type: http
  seq: 3

http:
  method: GET
  url: https://petstore.swagger.io/v2/pet/98755
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Correct ID returned", function() {
          const data = res.getBody();
          expect(data.id).to.equal(98755);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
