info:
  name: Delete a Pet (200)
  type: http
  seq: 13

http:
  method: DELETE
  url: https://petstore.swagger.io/v2/pet/98755
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response message matches deleted ID", function() {
          const data = res.getBody();
          // removing the pet we've registerd
          expect(data.message).to.equal("98755");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
