info:
  name: "Failing Test #2 (400)"
  type: http
  seq: 12

http:
  method: GET
  url: https://petstore.swagger.io/v2/pet/98755
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("This should fail Checking for wrong pet name", function() {
          const data = res.getBody();
          // We know the name is "UpdatedBrunoPet" because we've 
          // updated it in the put request, so checking for "Bob" will fail
          expect(data.name).to.equal("Bob"); 
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
