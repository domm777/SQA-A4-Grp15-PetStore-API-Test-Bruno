info:
  name: Pet Store Inventory (200)
  type: http
  seq: 9

http:
  method: GET
  url: https://petstore.swagger.io/v2/store/inventory
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Check for pet store status containing available pets", function() {
          const data = res.getBody();
          expect(data).to.have.property('available');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
