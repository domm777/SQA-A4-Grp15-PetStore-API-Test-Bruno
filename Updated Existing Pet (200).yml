info:
  name: Updated Existing Pet (200)
  type: http
  seq: 8

http:
  method: PUT
  url: https://petstore.swagger.io/v2/pet
  body:
    type: json
    data: |-
      {
        "id": 98755, 
        "name": "UpdatedBrunoPet", 
        "status": "sold"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status is 200", function() {
          expect(res.getStatus()).to.equal(200);
        });

        test("Our Pet's name was updated / changed", function() {
          const data = res.getBody();
          expect(data.name).to.equal("UpdatedBrunoPet");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
